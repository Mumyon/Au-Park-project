api:
  base_url: "http://127.0.0.1:8000/api/v1"
  timeout_seconds: 10

lot:
  id: "lot-main"

plate_camera:
  enabled: true
  role: "auto"
  source: 0
  # RTSP camera example for later:
  # source: "rtsp://username:password@192.168.0.50:554/stream1"
  frame_interval_seconds: 0.5
  min_repeat_count: 2
  cooldown_seconds: 30
  crop_output_dir: "data/plate_crops"
  debug_save_crops: false
  max_candidate_count: 2
  auto_rearm_absent_frames: 1
  roi:
    enabled: true
    polygon: [[80, 140], [1840, 140], [1840, 760], [80, 760]]
  ocr:
    provider: "easyocr"
    allowlist_regex: "[0-9]{2,3}[가-힣][0-9]{4}"
    min_confidence: 0.35
    max_image_width: 900

occupancy_camera:
  enabled: true
  source: 0
  frame_interval_seconds: 2.0
  reference_image: "data/occupancy_empty_reference.jpg"
  change_threshold: 28.0
  min_state_seconds: 6
  slots:
    - slot_id: "A-01"
      polygon: [[120, 320], [210, 300], [245, 430], [100, 450]]
    - slot_id: "A-02"
      polygon: [[220, 300], [310, 285], [360, 415], [250, 430]]
